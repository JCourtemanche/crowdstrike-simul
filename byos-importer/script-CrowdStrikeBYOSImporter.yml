  name: dry_run
  auto: PREDEFINED
  predefined:
  - 'true'
  - 'false'
  defaultValue: 'false'
  supportedModules: []
- description: Verify the Cortex API TLS certificate
  name: verify
  auto: PREDEFINED
  predefined:
  - 'true'
  - 'false'
  defaultValue: 'true'
  supportedModules: []
- description: After posting to BYOS, poll each returned job_id until terminal status
  name: poll_after_submit
  auto: PREDEFINED
  predefined:
  - 'true'
  - 'false'
  defaultValue: 'true'
  supportedModules: []
- description: Max seconds to wait for each job to reach a terminal status
  name: poll_timeout
  defaultValue: '180'
  supportedModules: []
- description: Initial delay between polls, backs off up to 30s
  name: poll_interval
  defaultValue: '5'
  supportedModules: []
